<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Laporan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold mb-6">📊 Dashboard Laporan Warga</h1>

  <div id="list" class="grid gap-4"></div>

  <script>
    async function loadData() {
      // GANTI dengan API lu
      const res = await fetch("https://your-api.com/laporan");
      const data = await res.json();

      const container = document.getElementById("list");
      container.innerHTML = "";

      data.forEach(item => {
        container.innerHTML += `
          <div class="bg-white p-4 rounded-xl shadow">
            <h2 class="font-bold text-lg">${item.kategori}</h2>
            <p class="text-sm text-gray-500">${item.lokasi}</p>
            <p class="mt-2">${item.ringkasan}</p>
            <p class="text-xs text-gray-400 mt-2">${item.tanggal}</p>
          </div>
        `;
      });
    }

    loadData();
  </script>

</body>
</html>
