<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WargaSpeak - Layanan Pengaduan RT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WargaSpeak</h1>
        <p><i>Sistem Laporan Warga RT 01 (Transparan & Cepat)</i></p>

        <hr>

        <div class="form-section">
            <label><b>Nama Pelapor:</b></label><br>
            <input type="text" id="namaPelapor" placeholder="Masukkan nama Anda"><br><br>

            <label><b>Isi Laporan:</b></label><br>
            <textarea id="isiLaporan" rows="4" cols="50" placeholder="Apa masalahnya? (misal: selokan mampet)"></textarea><br><br>

            <button id="btnKirim">Kirim Laporan</button>
        </div>

        <hr>

        <h3>Daftar Laporan Warga:</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Laporan</th>
                    <th>Status</th>
                    <th>Waktu</th>
                    <th>Aksi (Khusus RT)</th>
                </tr>
            </thead>
            <tbody id="tabelLaporan">
                </tbody>
        </table>
    </div>
    <script src="index.js"></script>
</body>
</html>
